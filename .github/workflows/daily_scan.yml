name: BIST Fırsat Taraması (2 Saatte Bir)

on:
  schedule:
    - cron: '0 7-15/2 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu checkout et
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Taramayı çalıştır ve Telegram'a gönder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEDUP_HOURS: '8'
        run: python daily_scan.py

      - name: Gönderim geçmişini commit'le
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sent_signals.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: tekrar-bildirim gecmisini guncelle [skip ci]"
            git push
          else
            echo "Gecmis dosyasinda degisiklik yok, commit atlaniyor."
          fi
